      # ---------------- Database Backup ----------------
      - name: Create Database Backup
        run: |
          # Create a directory for backups on the E: drive
          New-Item -ItemType Directory -Force -Path "E:\Backups"
          
          # Run the PowerShell script
          .\scripts\backup_db.ps1 `
            -DbUser "${{ secrets.DB_USER }}" `
            -DbPassword "${{ secrets.DB_PASSWORD }}" `
            -DbHost "${{ secrets.DB_HOST }}" `
            -DbName "${{ secrets.DB_NAME }}" `
            -BackupPath "E:\Backups"
        shell: powershell

      - name: Cleanup Old Backups
        run: |
          # Run the retention policy script
          .\scripts\cleanup_backups.ps1 `
            -BackupPath "E:\Backups" `
            -DbName "${{ secrets.DB_NAME }}"
        shell: powershell

      - name: Upload Backup and Logs to Cloud
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: |
            E:\Backups\*.sql
            E:\Backups\*.log
          retention-days: 30

      # ---------------- Tests & Logs ----------------
      - name: Run automated tests
        run: |
          dotnet test ./PortProject.Api.Tests/PortProject.Api.Tests.csproj --logger "trx;LogFileName=UnitTests.trx"


      - name: Archive test results
        uses: actions/upload-artifact@v4
        with:
          name: deployment-logs
          path: |
            **/TestResults/

